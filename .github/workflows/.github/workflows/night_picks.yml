name: Night Top Picks Selector

on:
  schedule:
    # 17:15 UTC = 20:15 българско време
    - cron: '15 17 * * *'
  workflow_dispatch: # Бутон за ръчно пускане

jobs:
  run-night:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests python-telegram-bot
    - name: Execute Night Picks
      run: python night_top_picks.py
