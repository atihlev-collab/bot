name: Night Top Picks Selector

on:
  schedule:
    # 17:00 UTC съответства точно на 20:00 часа българско време (зимно/лятно София време)
    - cron: '0 17 * * *'
  workflow_dispatch: # Бутон за ръчно пускане по всяко време

jobs:
  run-night-picks:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Libraries
      run: |
        python -m pip install --upgrade pip
        pip install requests python-telegram-bot

    - name: Run Night Selector
      run: python night_top_picks.py
