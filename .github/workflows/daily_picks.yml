name: Daily Top Picks Selector

on:
  schedule:
    # 07:12 UTC = 10:12 българско време (избягва натоварената 00-на минута)
    - cron: '12 7 * * *'
  workflow_dispatch: # Вълшебният бутон за ръчно пускане

jobs:
  run-daily:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests python-telegram-bot
    - name: Execute Daily Picks
      run: python daily_top_picks.py
