name: Daily Top 3 Picks Selector

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  run-daily-picks:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests python-telegram-bot
    - name: Execute Top 3 Selector
      run: python daily_top_picks.py
