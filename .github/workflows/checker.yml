name: Auto Results Checker

on:
  schedule:
    # Това е Cronjob таймерът на GitHub - пуска се на всеки 3 часа (в 00:00, 03:00, 06:00 и т.н.)
    - cron: '0 */3 * * *'
  workflow_dispatch: # Позволява ти да го пуснеш и ръчно с бутон, ако желаеш

jobs:
  check-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-python-version: '3.10'

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests scikit-learn joblib python-telegram-bot

    - name: Run Results Checker Script
      run: python results_checker.py

    - name: Automatically Save Changes to GitHub (dataset.json & picks.json)
      run: |
        git config --global user.name 'GitHub Actions Bot'
        git config --global user.email 'actions@github.com'
        git add dataset.json picks.json || true
        git commit -m "🤖 AI System: Automatically updated dataset and checked results" || true
        git push || true
